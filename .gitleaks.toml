# Gitleaks config for ContextDesk.
# Prefer redacting fixtures over allowlists. See docs/DEV.md § Secret scanning.

title = "ContextDesk"

[extend]
# Use default gitleaks rules; this file documents local policy + optional path allowlists.
useDefault = true

# Documented false positives: synthetic tokens used only to unit-test the
# redaction pipeline (MEMORY.md §5 / #272). Fixtures are built at runtime from
# string fragments; residual matches on marker strings are not live secrets.
[[allowlists]]
description = "Offline redaction unit-test fixtures (not live credentials)"
paths = ['''crates/cd-core/src/redact\.rs''']
