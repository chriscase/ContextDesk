name: Bug report
description: Report something that is broken or behaves incorrectly in ContextDesk.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        **Do not paste API keys, tokens, session credentials, private URLs with embedded
        credentials, or any other secret into this form.** Secrets belong in the OS keychain
        or environment variables, never in the repo or in issue text (see
        [AGENTS.md](https://github.com/chriscase/ContextDesk/blob/main/AGENTS.md)
        non-negotiable #1 and
        [SECURITY.md](https://github.com/chriscase/ContextDesk/blob/main/SECURITY.md)).
        Redact or replace any credential with a placeholder before pasting logs or config.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short description of what is wrong.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the behavior. Numbered list works best.
      placeholder: |
        1. Open the desktop app with provider X configured
        2. Run a chat session that calls the Y tool
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead, including any error text.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other / unknown
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider kind
      description: Which generic provider kind were you using? (No employer-specific names.)
      options:
        - not applicable
        - ollama
        - openai_compatible
        - anthropic
        - xai_grok_build
        - unknown
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: App version, git SHA, or "main @ date".
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs (redacted)
      description: |
        Relevant log output. Redact all secrets first. Wrap in a code block.
        Remember: **no API keys, tokens, or private URLs** — this form is public.
      render: shell
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else relevant — workarounds tried, related issues.
    validations:
      required: false
