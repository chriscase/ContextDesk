name: Feature request
description: Suggest an enhancement or new capability for ContextDesk.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an enhancement.

        ContextDesk is a research & synthesis workbench — not a coding/editing agent.
        See [docs/NON_GOALS.md](https://github.com/chriscase/ContextDesk/blob/main/docs/NON_GOALS.md)
        for the scope boundary before proposing something out of scope.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you would like to happen, and how it would work.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about, and why they fall short.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project does this touch?
      options:
        - desktop-ui
        - retrieval / index
        - providers
        - connectors / tools
        - security
        - server / embed
        - docs / community
        - other
        - not sure
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links to related issues, anything else useful.
    validations:
      required: false
