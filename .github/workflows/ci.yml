name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  secrets:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  claims:
    name: claim↔code guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check Shipped anchors in docs/CLAIMS.md
        run: sh scripts/check_claims.sh

  close-proof:
    name: close-proof discipline (#254)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: offline self-tests + fixtures (SHA, pasted-proof, duplicate bodies)
        run: |
          # Hard gate: exercises the matchers and duplicate detection offline.
          sh scripts/check_close_proof.sh --offline
          # Per-record fixture (includes a SHA-but-no-proof case that must be rejected).
          sh scripts/check_close_proof.sh --fixture scripts/fixtures/close_proof_sample.json
          # Duplicate-body fixture: must print a DUPLICATE flag and classify the pair as failing.
          out=$(sh scripts/check_close_proof.sh --fixture scripts/fixtures/close_proof_dupes.json)
          printf '%s\n' "$out"
          echo "$out" | grep -q "^DUPLICATE:" || { echo "expected a DUPLICATE flag" >&2; exit 1; }
      - name: enforce live remediation closes (blocking, scoped after cutoff)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Enforcement begins strictly AFTER this date. All remediation history
          # was closed on/before 2026-07-18, so this never breaks past closes;
          # it hard-fails only issues closed 2026-07-19 or later that lack a SHA
          # or pasted proof in their closing comment, or that duplicate another
          # issue's closing body. See docs/CLOSE_PROOF.md.
          CLOSE_PROOF_CUTOFF: "2026-07-18"
        run: sh scripts/check_close_proof.sh

  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Three-OS core matrix (#178): keychain naming + paths must stay offline-safe.
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Linux keyring deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Free disk space (Linux — bundled DuckDB build is large, #358)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /opt/hostedtoolcache/CodeQL /usr/local/lib/android /usr/share/dotnet /usr/local/.ghcup /opt/ghc
          df -h /
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        # rustfmt is OS-agnostic; still run on all three for early signal.
        run: cargo fmt --all -- --check
      - name: clippy (workspace, all targets)
        # Lints libs, bins, and tests (#162).
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test workspace
        # cd-core + cd-server (incl. tenant isolation) (#160); offline, no real keychain (#178).
        run: cargo test --workspace
      - name: embed_host example build (#170)
        # Keeps crates/cd-core/examples/embed_host from rotting.
        run: cargo build -p cd-core --examples
      - name: server smoke
        run: cargo run -p cd-server -- --print-branding

  tauri-host:
    name: tauri host (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Linux deps (keyring + webkit for Tauri link)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: fmt
        run: cargo fmt -- --check
      - name: clippy
        run: cargo clippy -- -D warnings
      - name: check
        run: cargo check

  desktop:
    name: desktop ui (typecheck, lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
